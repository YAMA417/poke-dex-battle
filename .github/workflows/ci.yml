name: CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: volta-cli/action@v4

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build shared package
        run: npm run build:shared

      - name: Typecheck (shared)
        run: npm run typecheck -w @poke-dex-battle/shared

      - name: Typecheck (web)
        run: npm run typecheck -w web

      - name: Test (shared)
        run: npm test -w @poke-dex-battle/shared -- run

      - name: Build web
        run: npm run build:web
